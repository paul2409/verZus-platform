<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">VERZUS championship trophy</title>
  <desc id="desc">A futuristic dark trophy with a glowing green VERZUS mark and cyan and purple light trails.</desc>
  <defs>
    <linearGradient id="cup" x1="0" y1="0" x2="1" y2="1">
