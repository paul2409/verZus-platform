<!-- VERZUS M9.1 ORIGINAL CREW CREST -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" role="img" aria-labelledby="title desc">
  <title id="title">Xenon Esports crest</title>
  <desc id="desc">Original angular purple and cyan shield with an X monogram.</desc>
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151029"/>
      <stop offset="0.5" stop-color="#27154a"/>
      <stop offset="1" stop-color="#090d16"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b86cff"/>
      <stop offset="1" stop-color="#2fffe5"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <path d="M120 8 222 46v80c0 72-39 120-102 146C57 246 18 198 18 126V46Z" fill="url(#shield)" stroke="url(#edge)" stroke-width="8"/>
  <path d="M120 29 199 58v65c0 56-28 96-79 120-51-24-79-64-79-120V58Z" fill="none" stroke="#6d3ca0" stroke-width="3" opacity=".8"/>
  <path d="m70 82 30 0 20 31 20-31h30l-34 55 38 62h-31l-23-38-23 38H66l38-62Z" fill="url(#edge)" filter="url(#glow)"/>
  <circle cx="120" cy="137" r="82" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-dasharray="4 10"/>
</svg>
