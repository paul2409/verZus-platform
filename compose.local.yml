services:
  postgres:
    image: postgres:16-alpine
    container_name: verzus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: verzus
      POSTGRES_USER: verzus
      POSTGRES_PASSWORD: verzus_local_only
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verzus -d verzus"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - verzus_postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:v1.30.0
    container_name: verzus-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  verzus_postgres_data:
