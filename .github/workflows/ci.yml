name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_APP_ENV: test
  NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3000/api
  NEXT_PUBLIC_ENABLE_MOCKS: "false"
  NEXT_PUBLIC_RELEASE_SHA: ${{ github.sha }}

jobs:
  validate:
    name: Validate and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate test environment
        run: npm run env:check:test

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit and component tests
        run: npm run test:coverage

      - name: Check architecture boundaries
        run: npm run check:boundaries

      - name: Check production guards
        run: npm run check:production-guards

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build production application
        run: npm run build

      - name: Package standalone build
        run: |
          mkdir -p artifacts
          tar -czf artifacts/verzus-${GITHUB_SHA}.tar.gz \
            .next/standalone \
            .next/static \
            public \
            package.json \
            package-lock.json

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

      - name: Upload immutable build artifact
        uses: actions/upload-artifact@v7
        with:
          name: verzus-build-${{ github.sha }}
          path: artifacts/verzus-${{ github.sha }}.tar.gz
          archive: false
          retention-days: 14

  e2e:
    name: Browser smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run Playwright
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
